<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jargon Generator</title>
  <style>
    body {
      font-family: 'Trebuchet MS', Arial, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
      background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 40%, #fbc2eb 70%, #a1c4fd 100%);
      color: #222;
    }

    /* Zany but not wobbling title */
    h1 {
      text-align: center;
      font-size: 3rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #fff;
      text-shadow: 0 0 10px #ff00ff, 0 0 20px #00ffff;
      margin-bottom: 10px;
    }

    p.intro {
      text-align: center;
      background: rgba(255,255,255,0.4);
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    fieldset {
      border: 3px dashed rgba(255,255,255,0.7);
      margin-bottom: 15px;
      padding: 10px 15px;
      background: rgba(0,0,0,0.15);
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    legend {
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 5px #000;
    }

    .word-row {
      display: flex;
      gap: 10px;
      margin-bottom: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .word-row label {
      flex: 0 0 70px;
      color: #fff;
      text-shadow: 0 0 3px #000;
    }

    .word-row input[type="text"] {
      flex: 1 1 200px;
      padding: 5px 8px;
      border-radius: 8px;
      border: 2px solid #fff;
      background: rgba(255,255,255,0.8);
      outline: none;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .word-row input[type="text"]:focus {
      transform: translateY(-2px);
      box-shadow: 0 0 10px rgba(255,255,255,0.8);
    }

    select {
      width: 100%;
      margin-top: 5px;
      padding: 6px 8px;
      border-radius: 8px;
      border: 2px solid #fff;
      background: rgba(255,255,255,0.8);
      outline: none;
    }

    #generateBtn {
      display: block;
      margin: 25px auto;
      padding: 12px 30px;
      font-size: 18px;
      cursor: pointer;
      border-radius: 999px;
      border: none;
      background: radial-gradient(circle at top left, #ffeb3b, #ff5722);
      color: #000;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      box-shadow: 0 6px 12px rgba(0,0,0,0.3);
      transition: transform 0.1s, box-shadow 0.1s;
    }

    #generateBtn:hover {
      transform: translateY(-3px) rotate(-1deg);
      box-shadow: 0 10px 18px rgba(0,0,0,0.4);
    }

    #generateBtn:active {
      transform: translateY(0) scale(0.97);
      box-shadow: 0 4px 8px rgba(0,0,0,0.5);
    }

    #output {
      margin-top: 20px;
      padding: 15px;
      background: rgba(0,0,0,0.6);
      border-radius: 15px;
      border: 2px solid #fff;
      min-height: 40px;
      color: #ffeb3b;
      font-size: 1.2rem;
      text-align: center;
      box-shadow: 0 8px 16px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <h1>Jargon Generator</h1>
  <p class="intro">Pick from the buzzword lists or type your own, then marvel at the nonsense.</p>

  <!-- Set 1 -->
  <fieldset>
    <legend>Word set 1</legend>
    <div class="word-row">
      <label for="w1a">Word 1:</label>
      <input id="w1a" type="text" list="list1a" placeholder="Choose or type">
      <datalist id="list1a">
        <option value="leverage"></option>
        <option value="synergize"></option>
        <option value="streamline"></option>
        <option value="pivot"></option>
        <option value="benchmark"></option>
        <option value="monetize"></option>
        <option value="iterate"></option>
        <option value="scale"></option>
        <option value="optimize"></option>
        <option value="facilitate"></option>
      </datalist>
    </div>
    <div class="word-row">
      <label for="w1b">Word 2:</label>
      <input id="w1b" type="text" list="list1b" placeholder="Choose or type">
      <datalist id="list1b">
        <option value="holistic"></option>
        <option value="disruptive"></option>
        <option value="synergistic"></option>
        <option value="strategic"></option>
        <option value="proactive"></option>
        <option value="innovative"></option>
        <option value="dynamic"></option>
        <option value="scalable"></option>
        <option value="customer-centric"></option>
        <option value="data-driven"></option>
      </datalist>
    </div>
    <div class="word-row">
      <label for="w1c">Word 3:</label>
      <input id="w1c" type="text" list="list1c" placeholder="Choose or type">
      <datalist id="list1c">
        <option value="ecosystems"></option>
        <option value="paradigms"></option>
        <option value="frameworks"></option>
        <option value="touchpoints"></option>
        <option value="deliverables"></option>
        <option value="roadmaps"></option>
        <option value="pipelines"></option>
        <option value="solutions"></option>
        <option value="KPIs"></option>
        <option value="value-chains"></option>
      </datalist>
    </div>
  </fieldset>

  <!-- Set 2 -->
  <fieldset>
    <legend>Word set 2</legend>
    <div class="word-row">
      <label for="w2a">Word 1:</label>
      <input id="w2a" type="text" list="list2a" placeholder="Choose or type">
      <datalist id="list2a">
        <option value="agile"></option>
        <option value="lean"></option>
        <option value="modular"></option>
        <option value="cloud-native"></option>
        <option value="plug-and-play"></option>
        <option value="robust"></option>
        <option value="end-to-end"></option>
        <option value="full-stack"></option>
        <option value="mission-critical"></option>
        <option value="future-proof"></option>
      </datalist>
    </div>
    <div class="word-row">
      <label for="w2b">Word 2:</label>
      <input id="w2b" type="text" list="list2b" placeholder="Choose or type">
      <datalist id="list2b">
        <option value="stakeholder"></option>
        <option value="customer"></option>
        <option value="user"></option>
        <option value="partner"></option>
        <option value="investor"></option>
        <option value="community"></option>
        <option value="board"></option>
        <option value="team"></option>
        <option value="leadership"></option>
        <option value="ecosystem"></option>
      </datalist>
    </div>
    <div class="word-row">
      <label for="w2c">Word 3:</label>
      <input id="w2c" type="text" list="list2c" placeholder="Choose or type">
      <datalist id="list2c">
        <option value="engagement"></option>
        <option value="alignment"></option>
        <option value="adoption"></option>
        <option value="retention"></option>
        <option value="collaboration"></option>
        <option value="enablement"></option>
        <option value="ownership"></option>
        <option value="governance"></option>
        <option value="advocacy"></option>
        <option value="activation"></option>
      </datalist>
    </div>
  </fieldset>

  <!-- Set 3 -->
  <fieldset>
    <legend>Word set 3</legend>
    <div class="word-row">
      <label for="w3a">Word 1:</label>
      <input id="w3a" type="text" list="list3a" placeholder="Choose or type">
      <datalist id="list3a">
        <option value="frictionless"></option>
        <option value="omnichannel"></option>
        <option value="personalized"></option>
        <option value="immersive"></option>
        <option value="gamified"></option>
        <option value="hyperlocal"></option>
        <option value="always-on"></option>
        <option value="real-time"></option>
        <option value="sustainable"></option>
        <option value="inclusive"></option>
      </datalist>
    </div>
    <div class="word-row">
      <label for="w3b">Word 2:</label>
      <input id="w3b" type="text" list="list3b" placeholder="Choose or type">
      <datalist id="list3b">
        <option value="journeys"></option>
        <option value="experiences"></option>
        <option value="workflows"></option>
        <option value="sprints"></option>
        <option value="initiatives"></option>
        <option value="campaigns"></option>
        <option value="touchpoints"></option>
        <option value="interfaces"></option>
        <option value="channels"></option>
        <option value="assets"></option>
      </datalist>
    </div>
    <div class="word-row">
      <label for="w3c">Word 3:</label>
      <input id="w3c" type="text" list="list3c" placeholder="Choose or type">
      <datalist id="list3c">
        <option value="portfolio"></option>
        <option value="stack"></option>
        <option value="suite"></option>
        <option value="platform"></option>
        <option value="ecosystem"></option>
        <option value="offering"></option>
        <option value="blueprint"></option>
        <option value="architecture"></option>
        <option value="playbook"></option>
        <option value="grid"></option>
      </datalist>
    </div>
  </fieldset>

  <!-- Continuation phrases set 1 -->
  <fieldset>
    <legend>Continuation set 1</legend>
    <label for="contA">Choose phrase:</label>
    <select id="contA">
      <option value="together with">together with</option>
      <option value="and">and</option>
    </select>
  </fieldset>

  <!-- Continuation phrases set 2 -->
  <fieldset>
    <legend>Continuation set 2</legend>
    <label for="contB">Choose phrase:</label>
    <select id="contB">
      <option value="leads to">leads to</option>
      <option value="results in">results in</option>
    </select>
  </fieldset>

  <button id="generateBtn">Generate Jargon</button>

  <div id="output"></div>

  <script>
    document.getElementById("generateBtn").addEventListener("click", function () {
      var set1 = [
        document.getElementById("w1a").value.trim(),
        document.getElementById("w1b").value.trim(),
        document.getElementById("w1c").value.trim()
      ];
      var set2 = [
        document.getElementById("w2a").value.trim(),
        document.getElementById("w2b").value.trim(),
        document.getElementById("w2c").value.trim()
      ];
      var set3 = [
        document.getElementById("w3a").value.trim(),
        document.getElementById("w3b").value.trim(),
        document.getElementById("w3c").value.trim()
      ];

      var contA = document.getElementById("contA").value;
      var contB = document.getElementById("contB").value;

      var allFilled = set1.concat(set2).concat(set3).every(function (w) { return w.length > 0; });

      if (!allFilled) {
        document.getElementById("output").textContent =
          "Please fill in all nine words before generating jargon.";
        return;
      }

      // Pattern: set1 + contA + set2 + contB + set3
      var sentence =
        set1.join(" ") + " " +
        contA + " " +
        set2.join(" ") + " " +
        contB + " " +
        set3.join(" ");

      document.getElementById("output").textContent = sentence;
    });
  </script>
</body>
</html>
